<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>HafuGo AI Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --bg-2: #141414; --bg-3: #1a1a1a;
    --border: #222; --border-2: #333;
    --text: #f5f5f5; --text-2: #aaa; --text-3: #666;
    --accent: #f59e0b; --accent-2: #fbbf24;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444;
    --blue: #60a5fa; --purple: #a78bfa; --pink: #ec4899;
    --n-bg: #191919; --n-bg-2: #202020; --n-bg-3: #252525;
    --n-text: #e6e6e6; --n-text-2: #9b9b9b; --n-border: #2e2e2e;
    --n-tag-red: rgba(255,115,105,0.2); --n-tag-red-t: #ff7369;
    --n-tag-blue: rgba(83,145,240,0.2); --n-tag-blue-t: #5391f0;
    --n-tag-green: rgba(77,171,154,0.2); --n-tag-green-t: #4dab9a;
    --n-tag-yellow: rgba(255,197,107,0.2); --n-tag-yellow-t: #ffc56b;
    --n-tag-purple: rgba(183,143,235,0.2); --n-tag-purple-t: #b78feb;
    --n-tag-gray: rgba(151,151,151,0.2); --n-tag-gray-t: #979797;
    --fio-bg: #141618; --fio-bg-2: #1c1f23; --fio-text: #d4d7dc;
    --fio-blue: #5a7eff; --fio-border: #2a2e33;
  }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .container { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 20px; }

  /* HERO */
  .hero {
    padding: 80px 0 44px;
    background:
      radial-gradient(ellipse at top, rgba(245,158,11,0.16), transparent 60%),
      var(--bg);
  }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }
  .hero h1 {
    font-weight: 800; letter-spacing: -0.02em; line-height: 1.05;
    font-size: clamp(32px, 9vw, 52px); margin-bottom: 18px;
    background: linear-gradient(180deg, #fff 0%, #888 120%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p { font-size: 15px; color: var(--text-2); max-width: 420px; margin-bottom: 24px; }
  .hero-stats { display: flex; gap: 24px; font-size: 12px; color: var(--text-3); }
  .hero-stats span { color: var(--accent-2); font-weight: 700; font-size: 18px; display: block; letter-spacing: -0.01em; }

  /* STAGE SECTIONS */
  .stages { padding: 40px 0 40px; }
  .stage {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 20px;
    padding: 22px; margin-bottom: 16px;
  }
  .stage-head { margin-bottom: 18px; }
  .stage-num { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 4px; }
  .stage-name { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -0.01em; }
  .stage-desc { font-size: 13px; color: var(--text-2); }

  /* TOOL TABS */
  .tool-tabs {
    display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding-bottom: 8px; margin: 0 -22px 14px; padding-left: 22px; padding-right: 22px;
    scroll-behavior: smooth;
  }
  .tool-tabs::-webkit-scrollbar { display: none; }
  .tool-tab {
    font-size: 12px; padding: 7px 13px; border-radius: 16px;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text-2); font-weight: 500; white-space: nowrap; flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .tool-tab:active { transform: scale(0.96); }
  .tool-tab.active {
    background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 700;
  }
  .tool-tab.notion { color: var(--purple); border-color: rgba(168,85,247,0.2); }
  .tool-tab.human { color: var(--red); border-color: rgba(239,68,68,0.2); }
  .tool-tab.notion.active, .tool-tab.human.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }

  /* TOOL INFO PANEL */
  .tool-info {
    background: var(--bg-3); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; margin-bottom: 14px;
  }
  .tool-cat {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
    color: var(--text-3); margin-bottom: 6px;
  }
  .tool-name { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .tool-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 14px; }
  .run-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #0a0a0a;
    font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 10px;
    transition: transform 0.15s ease;
  }
  .run-btn:active { transform: scale(0.97); }
  .run-btn.running { background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border-2); }
  .run-btn.done { background: var(--green); color: #fff; }
  .run-btn.disabled { opacity: 0.4; pointer-events: none; }

  /* TOOL OUTPUT */
  .tool-output { min-height: 40px; }
  .tool-output:empty { display: none; }

  /* SHARED — mac chrome for app frames */
  .app-frame { border-radius: 10px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 4px; }
  .app-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-bottom: 1px solid; position: relative; }
  .app-dot { width: 10px; height: 10px; border-radius: 50%; }
  .app-title { flex: 1; font-size: 11px; font-weight: 600; text-align: center; letter-spacing: 0.2px; }

  /* NOTION look */
  .notion { background: var(--n-bg); color: var(--n-text); }
  .notion .app-bar { background: var(--n-bg-2); border-bottom-color: var(--n-border); }
  .notion .app-title { color: var(--n-text-2); }
  .notion-header { padding: 14px 14px 8px; display: flex; align-items: center; gap: 8px; }
  .notion-icon { width: 22px; height: 22px; border-radius: 4px; background: linear-gradient(135deg, #f59e0b, #ef4444); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
  .notion-db-title { font-size: 16px; font-weight: 700; color: #fff; }
  .notion-db-meta { font-size: 11px; color: var(--n-text-2); margin-left: auto; }
  .n-table { font-size: 12px; width: 100%; }
  .n-row {
    display: grid; grid-template-columns: 22px 1fr 66px 46px 66px;
    gap: 8px; padding: 8px 14px; align-items: center;
    border-top: 1px solid var(--n-border);
    opacity: 0; transform: translateY(4px); transition: all 0.3s;
  }
  .n-row.header { font-size: 10px; text-transform: uppercase; color: var(--n-text-2); letter-spacing: 0.5px; opacity: 1; transform: none; background: var(--n-bg-2); font-weight: 600; }
  .n-row.in { opacity: 1; transform: none; }
  .n-check { width: 14px; height: 14px; border: 1px solid var(--n-border); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; background: transparent; }
  .n-check.done { background: var(--n-tag-blue-t); border-color: var(--n-tag-blue-t); color: #fff; }
  .n-title-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .n-page-icon { width: 16px; height: 12px; border-radius: 2px; flex-shrink: 0; background: linear-gradient(135deg, var(--c1, #ef4444), var(--c2, #f59e0b)); }
  .n-title { font-size: 13px; color: var(--n-text); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .n-tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 500; white-space: nowrap; }
  .n-tag.blue { background: var(--n-tag-blue); color: var(--n-tag-blue-t); }
  .n-tag.green { background: var(--n-tag-green); color: var(--n-tag-green-t); }
  .n-tag.yellow { background: var(--n-tag-yellow); color: var(--n-tag-yellow-t); }
  .n-tag.red { background: var(--n-tag-red); color: var(--n-tag-red-t); }
  .n-tag.purple { background: var(--n-tag-purple); color: var(--n-tag-purple-t); }
  .n-tag.gray { background: var(--n-tag-gray); color: var(--n-tag-gray-t); }
  .n-views { font-size: 11px; color: var(--n-text-2); }

  /* Notion 2-col script */
  .n-script-wrap { padding: 14px; }
  .n-script-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #fff; }
  .n-script-sub { font-size: 11px; color: var(--n-text-2); margin-bottom: 12px; }
  .n-script-tag { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 3px; background: var(--n-tag-red); color: var(--n-tag-red-t); font-weight: 600; margin-bottom: 14px; }
  .intro-frame { background: rgba(255,197,107,0.08); border: 1px solid rgba(255,197,107,0.25); border-radius: 4px; padding: 10px 12px; margin-bottom: 14px; }
  .intro-frame .head { font-size: 10px; color: var(--n-tag-yellow-t); font-weight: 700; letter-spacing: 0.8px; margin-bottom: 4px; }
  .intro-frame .body { font-size: 12px; color: var(--n-text); line-height: 1.5; }
  .script-2col { border: 1px solid var(--n-border); border-radius: 4px; overflow: hidden; }
  .script-h { display: grid; grid-template-columns: 110px 1fr; font-size: 10px; color: var(--n-text-2); font-weight: 600; background: var(--n-bg-2); letter-spacing: 0.5px; }
  .script-h div { padding: 8px 10px; text-transform: uppercase; }
  .script-h div:first-child { border-right: 1px solid var(--n-border); }
  .script-r { display: grid; grid-template-columns: 110px 1fr; border-top: 1px solid var(--n-border); font-size: 12px; line-height: 1.5; opacity: 0; transform: translateY(4px); transition: all 0.3s; }
  .script-r.in { opacity: 1; transform: none; }
  .script-r > div { padding: 8px 10px; }
  .script-r .vis { color: var(--n-text-2); font-style: italic; border-right: 1px solid var(--n-border); }
  .script-r .hs { color: var(--n-text); }
  .script-r .hs .lbl { color: var(--n-tag-red-t); font-weight: 700; font-style: normal; margin-right: 4px; font-size: 11px; }
  .qa-footer { margin-top: 10px; padding: 8px 10px; border-radius: 4px; background: rgba(77,171,154,0.08); border: 1px solid rgba(77,171,154,0.25); font-size: 11px; color: var(--n-tag-green-t); display: flex; justify-content: space-between; opacity: 0; transition: opacity 0.3s; }
  .qa-footer.in { opacity: 1; }

  /* Notion shopping */
  .shop-wrap { padding: 14px; }
  .shop-h { font-size: 11px; color: var(--n-text-2); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
  .shop-row { display: grid; grid-template-columns: 1fr 80px 60px; gap: 8px; align-items: center; font-size: 12px; padding: 8px 0; border-top: 1px solid var(--n-border); opacity: 0; transform: translateY(3px); transition: all 0.25s; }
  .shop-row.in { opacity: 1; transform: none; }
  .shop-row.head { font-size: 10px; color: var(--n-text-2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding-top: 0; border-top: none; opacity: 1; transform: none; }
  .shop-item { color: var(--n-text); }
  .shop-item .prime { font-size: 9px; color: var(--n-tag-blue-t); margin-left: 6px; font-weight: 700; background: var(--n-tag-blue); padding: 1px 5px; border-radius: 2px; }
  .shop-src { color: var(--n-text-2); font-size: 11px; }
  .shop-price { color: var(--n-tag-green-t); font-weight: 700; text-align: right; }
  .shop-total { margin-top: 10px; padding: 10px 12px; background: var(--n-tag-green); border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--n-tag-green-t); font-weight: 700; opacity: 0; transition: opacity 0.3s; }
  .shop-total.in { opacity: 1; }

  /* Frame.io */
  .fio { background: var(--fio-bg); color: var(--fio-text); }
  .fio .app-bar { background: var(--fio-bg-2); border-bottom-color: var(--fio-border); }
  .fio .app-title { color: var(--fio-text); }
  .fio-video { aspect-ratio: 16 / 9; background: #000; background-image: radial-gradient(circle at 40% 55%, rgba(239,68,68,0.5), transparent 30%), linear-gradient(180deg, #1a1a1a 0%, #000 100%); position: relative; }
  .fio-timebar { position: absolute; left: 0; right: 0; bottom: 0; height: 22px; background: rgba(0,0,0,0.6); display: flex; align-items: center; padding: 0 8px; font-size: 10px; color: #fff; font-variant-numeric: tabular-nums; justify-content: space-between; }
  .fio-timebar-track { flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 8px; position: relative; }
  .fio-timebar-fill { height: 100%; width: 38%; background: var(--fio-blue); border-radius: 2px; }
  .fio-pin { position: absolute; top: -3px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); transform: translateX(-50%); box-shadow: 0 0 0 2px var(--fio-bg-2); }
  .fio-comments { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
  .fio-comment { display: flex; gap: 10px; opacity: 0; transform: translateY(4px); transition: all 0.3s; }
  .fio-comment.in { opacity: 1; transform: none; }
  .fio-avatar { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--fio-blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; }
  .fio-ai .fio-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0a; }
  .fio-body { flex: 1; min-width: 0; }
  .fio-head { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #6d737d; margin-bottom: 2px; }
  .fio-name { color: #fff; font-weight: 600; font-size: 11px; }
  .fio-time { background: rgba(90,126,255,0.2); color: var(--fio-blue); padding: 1px 6px; border-radius: 3px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .fio-ai .fio-time { background: rgba(245,158,11,0.18); color: var(--accent); }
  .fio-text { font-size: 12px; color: var(--fio-text); line-height: 1.5; }
  .fio-text .warn-pill { color: var(--yellow); font-weight: 600; }
  .fio-text .ok-pill { color: var(--green); font-weight: 600; }

  /* Shot list / Filming */
  .shotlist { padding: 12px; background: var(--n-bg); }
  .shotlist-row { display: grid; grid-template-columns: 18px 40px 1fr 50px; gap: 8px; align-items: center; padding: 6px 0; border-top: 1px solid var(--n-border); font-size: 12px; color: var(--n-text); opacity: 0; transform: translateY(3px); transition: all 0.25s; }
  .shotlist-row.in { opacity: 1; transform: none; }
  .shotlist-check { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--n-border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; }
  .shotlist-row.done .shotlist-check { background: var(--green); border-color: var(--green); color: #fff; }
  .shotlist-scene { font-size: 10px; color: var(--n-text-2); font-weight: 700; letter-spacing: 0.5px; }
  .shotlist-title { font-size: 12px; }
  .shotlist-dur { font-size: 11px; color: var(--n-text-2); text-align: right; font-variant-numeric: tabular-nums; }
  .shotlist-row.active { background: rgba(239,68,68,0.06); }
  .shotlist-row.active .shotlist-title { color: var(--red); font-weight: 600; }
  .film-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 4px; animation: recblink 1.2s ease-in-out infinite; }
  @keyframes recblink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .runtime-badge { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; background: rgba(239,68,68,0.1); color: var(--red); font-size: 11px; padding: 4px 10px; border-radius: 12px; font-variant-numeric: tabular-nums; font-weight: 600; }

  /* DittoDub */
  .dd { background: #0d0e10; color: #e6e6e6; }
  .dd .app-bar { background: #14161a; border-bottom-color: #24262a; }
  .dd .app-title { color: #a7aab0; }
  .dd-body { padding: 12px; }
  .dd-meta { font-size: 11px; color: #6d737d; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .dd-meta strong { color: #fff; font-weight: 600; }
  .dd-track { display: grid; grid-template-columns: 46px 1fr 36px 18px; gap: 10px; align-items: center; padding: 10px 0; border-top: 1px solid #1f2126; font-size: 12px; }
  .dd-lang { background: #1c1e22; border: 1px solid #2a2d33; border-radius: 4px; padding: 5px 0; text-align: center; font-weight: 700; color: #fff; font-size: 11px; letter-spacing: 0.4px; }
  .dd-wave { height: 20px; position: relative; display: flex; align-items: center; gap: 1px; overflow: hidden; }
  .dd-wave .bar { width: 2px; background: #3c424a; border-radius: 1px; transition: background 0.4s; }
  .dd-track.playing .dd-wave .bar { background: linear-gradient(180deg, var(--fio-blue), var(--green)); }
  .dd-track.done .dd-wave .bar { background: var(--green); }
  .dd-dur { font-size: 10px; color: #6d737d; font-variant-numeric: tabular-nums; text-align: right; }
  .dd-status { font-size: 12px; color: #3c424a; text-align: center; }
  .dd-track.done .dd-status { color: var(--green); }

  /* YT Studio */
  .yt { background: #181818; color: #fff; }
  .yt .app-bar { background: #0f0f0f; border-bottom-color: #303030; }
  .yt .app-title { color: #aaa; }
  .yt-head { padding: 12px 14px 6px; display: flex; justify-content: space-between; align-items: center; }
  .yt-tabs { display: flex; gap: 16px; padding: 0 14px; border-bottom: 1px solid #303030; margin-bottom: 2px; }
  .yt-tab-yt { font-size: 11px; color: #aaa; padding: 6px 0; }
  .yt-tab-yt.active { color: #fff; border-bottom: 2px solid #f00; margin-bottom: -1px; }
  .yt-row { display: grid; grid-template-columns: 44px 1fr auto; gap: 10px; align-items: center; padding: 10px 14px; border-top: 1px solid #202020; font-size: 12px; opacity: 0; transform: translateY(3px); transition: all 0.3s; }
  .yt-row.in { opacity: 1; transform: none; }
  .yt-thumb { width: 44px; flex-shrink: 0; border-radius: 3px; overflow: hidden; }
  .yt-thumb .yt-tb { border-radius: 3px; }
  .yt-dur { position: absolute; bottom: 2px; right: 2px; font-size: 8px; background: rgba(0,0,0,0.8); color: #fff; padding: 0 3px; border-radius: 2px; font-variant-numeric: tabular-nums; }
  .yt-title { font-size: 12px; color: #fff; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .yt-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
  .yt-status { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: #3ea6ff; font-weight: 600; }
  .yt-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #3ea6ff; }

  /* YT Analytics */
  .yt-stat-grid { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .yt-stat { background: #0f0f0f; border: 1px solid #202020; border-radius: 8px; padding: 10px 12px; }
  .yt-stat .l { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 4px; }
  .yt-stat .v { font-size: 22px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; line-height: 1; }
  .yt-stat .d { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .yt-stat .d.up { color: #3ea6ff; }
  .yt-stat .d.warm { color: var(--green); }
  .yt-stat .d.down { color: var(--red); }
  .yt-chart { height: 40px; margin-top: 8px; display: flex; align-items: flex-end; gap: 2px; }
  .yt-chart .b { flex: 1; background: linear-gradient(180deg, #3ea6ff, rgba(62,166,255,0.2)); border-radius: 1px; height: 20%; transition: height 0.8s cubic-bezier(.2,.7,.2,1); }

  /* Thumbnail Eval (custom) */
  .tev-frame { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
  .tev-head { background: #141414; padding: 10px 14px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
  .tev-head-dots { display: flex; gap: 6px; }
  .tev-head-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tev-head-title { flex: 1; text-align: center; font-size: 12px; color: #aaa; font-weight: 500; margin-right: 40px; }
  .tev-body { padding: 14px; }
  .tev-thumb { width: 100%; border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .tev-thumb .yt-tb { border-radius: 6px; }
  .tev-score { display: flex; gap: 16px; align-items: center; margin-bottom: 18px; }

// ============ HELPER: mac chrome ============
function macBar(title, ns) {
  return `<div class="${ns}-head">
    <div class="${ns}-head-dots">
      <div class="${ns}-head-dot" style="background:#ff5f57"></div>
      <div class="${ns}-head-dot" style="background:#febc2e"></div>
      <div class="${ns}-head-dot" style="background:#28c840"></div>
    </div>
    <div class="${ns}-head-title">${title}</div>
  </div>`;
}
function appBar(title) {
  return `<div class="app-bar">
    <div class="app-dot" style="background:#ff5f57"></div>
    <div class="app-dot" style="background:#febc2e"></div>
    <div class="app-dot" style="background:#28c840"></div>
    <div class="app-title">${title}</div>
    <div style="width:36px"></div>
  </div>`;
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============ THUMBNAIL BUILDER ============
// Generates a YouTube-style thumbnail (bold text, face silhouette, gradient, shape overlay).
// Uses only CSS + inline HTML. Works offline.
function renderThumb(opts) {
  const { title = '', tc1 = '#ef4444', tc2 = '#991b1b', size = 'md', vertical = false, face = true, duration = '' } = opts;
  const face_ = face ? '<div class="yt-tb-face"></div>' : '';
  const dur = duration ? `<div class="yt-tb-dur">${duration}</div>` : '';
  // Auto-highlight ONE bold word in the title (first all-caps word or first number-containing word)
  const titleHtml = String(title).replace(/(\b\d[\d,.$%+x]*\b|\b[A-Z]{2,}\b)/, '<span class="hl">$1</span>');
  return `<div class="yt-tb${vertical ? ' vert' : ''}" style="--tc1:${tc1};--tc2:${tc2}">
    <div class="yt-tb-shape a"></div>
    <div class="yt-tb-shape b"></div>
    ${face_}
    <div class="yt-tb-txt ${size}">${titleHtml}</div>
    ${dur}
  </div>`;
}

const R = {};

R.notionIdeas = async (root, data) => {
  const frame = document.createElement('div');
  frame.className = 'app-frame notion';
  frame.innerHTML = `
    ${appBar('notion.so · ' + (data.dbName || 'Database'))}
    <div class="notion-header">
      <div class="notion-icon">N</div>
      <div class="notion-db-title">${data.dbName || 'Database'}</div>
      <div class="notion-db-meta">Table · ${data.rows.length} rows</div>
    </div>
    <div class="n-table">
      <div class="n-row header"><div></div><div>Title</div><div>Status</div><div>Score</div><div>Format</div></div>
      <div id="nbody"></div>
    </div>`;
  root.appendChild(frame);
  const body = frame.querySelector('#nbody');
  for (const r of data.rows) {
    await wait(180);
    const row = document.createElement('div');
    row.className = 'n-row';
    const tagColor = r.status === 'Ready' || r.status === 'Approved' || r.status === 'Enriched' || r.status === 'Revised' ? 'green'
      : r.status === 'Review' || r.status === 'Revise' || r.status === 'New' ? 'yellow'
      : r.status === 'Rejected' || r.status === 'Avoid' ? 'red'
      : r.status === 'Draft' ? 'gray' : 'blue';
    const fmtColor = r.format === 'Long-form' ? 'purple' : r.format === 'TikTok' ? 'gray' : r.format === 'Instagram' ? 'purple' : 'blue';
    row.innerHTML = `
      <div class="n-check done">&check;</div>
      <div class="n-title-cell">
        <div class="n-page-icon" style="--c1:${r.c1};--c2:${r.c2}"></div>
        <div class="n-title">${r.title}</div>
      </div>
      <div><span class="n-tag ${tagColor}">${r.status}</span></div>
      <div class="n-views">${r.score}</div>
      <div><span class="n-tag ${fmtColor}">${r.format}</span></div>`;
    body.appendChild(row);
    requestAnimationFrame(() => row.classList.add('in'));
  }
};

R.dittodub = async (root, data) => {
  const frame = document.createElement('div');
  frame.className = 'app-frame dd';
  frame.innerHTML = `
    ${appBar('DittoDub · Project')}
    <div class="dd-body">
      <div class="dd-meta"><strong>${data.projectName}</strong><span>Duration ${data.duration} &middot; ${data.tracks.length} tracks</span></div>
      <div id="dd-tracks"></div>
    </div>`;
  root.appendChild(frame);
  const tracks = frame.querySelector('#dd-tracks');
  const wave = () => {
    let s = '';
    for (let i = 0; i < 42; i++) {
      const h = 20 + Math.floor(Math.abs(Math.sin(i * 0.7) * 70));
      s += `<div class="bar" style="height:${h}%"></div>`;
    }
    return s;
  };
  const rows = [];
  for (const t of data.tracks) {
    const row = document.createElement('div');
    row.className = 'dd-track' + (t.status === 'done' ? ' done' : '');
    row.innerHTML = `
      <div class="dd-lang">${t.lang}</div>
      <div class="dd-wave">${wave()}</div>
      <div class="dd-dur">0:${Math.floor(Math.random()*10)+40}</div>
      <div class="dd-status">${t.status === 'done' ? '&check;' : '&middot;'}</div>`;
    tracks.appendChild(row);
    rows.push(row);
  }
  await wait(250);
  for (const row of rows) {
    if (row.classList.contains('done')) continue;
    row.classList.add('playing');
    await wait(230);
    row.classList.remove('playing');
    row.classList.add('done');
    row.querySelector('.dd-status').innerHTML = '&check;';
  }
};

R.thumbGen = async (root, data) => {
  const frame = document.createElement('div');
  frame.className = 'tg-frame';
  frame.innerHTML = `
    ${macBar('Thumbnail Generator · Freepik Mystic', 'tg-head')}
    <div class="tg-body">
      <div class="tg-prompt-box">
        <div class="tg-prompt-lbl">Prompt</div>
        <div class="tg-prompt-txt" id="tg-prompt"></div>
      </div>
      <div class="tg-grid" id="tg-grid"></div>
      <div class="tg-summary" id="tg-summary">Winner: <b>Variant ${data.winner}</b> selected (score ${data.variants[data.winner-1].score}%). Uploaded to Notion.</div>
    </div>`;
  root.appendChild(frame);
  // Type the prompt
  const promptEl = frame.querySelector('#tg-prompt');
  const fullPrompt = data.prompt;
  for (let i = 0; i <= fullPrompt.length; i++) {
    promptEl.textContent = fullPrompt.slice(0, i);
    await wait(12);
  }
  // Render 4 variant cards (placeholder + spinner)
  const grid = frame.querySelector('#tg-grid');
  data.variants.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'tg-card';
    card.dataset.idx = i + 1;
    card.innerHTML = `
      <div class="tg-winner-badge">WINNER</div>
      ${renderThumb({ title: v.title, tc1: v.tc1, tc2: v.tc2, size: 'sm', face: v.face })}
      <div class="tg-card-status">
        <div style="text-align:center;">
          <div class="tg-spinner"></div>
          <div>Generating...</div>
        </div>
      </div>
      <div class="tg-card-meta">
        <div class="tg-card-label">Variant ${i + 1}</div>
        <div class="tg-score">—</div>
      </div>`;
    grid.appendChild(card);
  });
  // Stagger each variant's load (imitating async image gen)
  const cards = grid.querySelectorAll('.tg-card');
  for (let i = 0; i < cards.length; i++) {
    await wait(650);
    cards[i].classList.add('loaded');
    cards[i].querySelector('.tg-score').textContent = data.variants[i].score + '%';
  }
  await wait(400);
  // Highlight winner
  const winner = cards[data.winner - 1];
  winner.classList.add('winner');
  await wait(300);
  frame.querySelector('#tg-summary').classList.add('in');
};

R.infoCard = async (root, data) => {
  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `
    ${data.sub ? `<div class="ic-sub">${data.sub}</div>` : ''}

    <div class="ic-body">${data.body || ''}</div>
    ${data.rows ? `<div class="ic-rows" id="ic-rows"></div>` : ''}`;
  root.appendChild(card);
  if (data.rows) {
    const rows = card.querySelector('#ic-rows');
    for (const r of data.rows) {
      await wait(130);
      const el = document.createElement('div');
      el.className = 'ic-row';
      el.innerHTML = `<span class="l">${r.l}</span><span class="v">${r.v}</span>`;
      rows.appendChild(el);
      requestAnimationFrame(() => el.classList.add('in'));
    }
  }
};

// ============ RENDER UI ============
const root = document.getElementById('stages-root');

STAGES.forEach(stage => {
  const stageTools = TOOLS.filter(t => t.stage === stage.id);
  if (stageTools.length === 0) return;

  const section = document.createElement('div');
  section.className = 'stage';
  section.dataset.stage = stage.id;
  section.innerHTML = `
    <div class="stage-head">
      <div class="stage-num">${stage.num} / ${stage.name.toUpperCase()}</div>
      <div class="stage-name">${stage.name}</div>
      <div class="stage-desc">${stage.desc}</div>
    </div>
    <div class="tool-tabs">
      ${stageTools.map((t, i) => `<button class="tool-tab${i === 0 ? ' active' : ''} ${t.cat === 'Notion Agent' ? 'notion' : ''}${t.cat === 'Human' ? 'human' : ''}" data-tool="${t.id}">${DISPLAY_NAMES[t.id] || t.name}</button>`).join('')}
    </div>
    <div class="tool-info" id="info-${stage.id}"></div>
    <div class="tool-output" id="out-${stage.id}"></div>
  `;
  root.appendChild(section);

  // Init first tool
  selectTool(stage.id, stageTools[0].id);

  // Tab click handlers
  section.querySelectorAll('.tool-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const toolId = tab.dataset.tool;
      section.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectTool(stage.id, toolId);
    });
  });
});

function selectTool(stageId, toolId) {
  const tool = TOOLS.find(t => t.id === toolId);
  if (!tool) return;
  const info = document.getElementById('info-' + stageId);
  const out = document.getElementById('out-' + stageId);
  out.innerHTML = '';
  const displayName = DISPLAY_NAMES[tool.id] || tool.name;
  info.innerHTML = `
    <div class="tool-cat">${tool.cat} &middot; <span style="color:var(--text-2);font-family:'SF Mono',Menlo,monospace;text-transform:lowercase;letter-spacing:0;">${tool.name}</span></div>
    <div class="tool-name">${displayName}</div>
    <div class="tool-desc">${tool.desc}</div>
    <button class="run-btn" data-run="${toolId}" data-stage="${stageId}">&#9654; Run demo</button>
  `;
  info.querySelector('.run-btn').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    if (btn.classList.contains('running')) return;
    btn.classList.add('running');
    btn.innerHTML = '&#9203; Running...';
    out.innerHTML = '';
    const renderer = R[tool.renderer];
    if (renderer) {
      try { await renderer(out, tool.data); }
      catch (err) { console.error(err); out.innerHTML = '<div class="empty-card"><div class="e-t">Render error</div><div class="e-s">' + err.message + '</div></div>'; }
    }
    btn.classList.remove('running');
    btn.classList.add('done');
    btn.innerHTML = '&check; Done · tap to rerun';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = '&#9654; Run again';
    }, 3500);
  });
}
